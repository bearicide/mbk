<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"><meta name="theme-color" content="#050608"><title>MBK // MATTBEAR</title><style>:root{--bg:#050608;--panel:#10141a;--text:#f4fff8;--muted:#8fa3a0;--cyan:#20f6ff;--green:#9dff5f;--hot:#ff2f8d;--yellow:#ffe86b;--red:#ff3a3a}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:Bahnschrift,"Arial Narrow",system-ui,sans-serif;overscroll-behavior:none;touch-action:manipulation;user-select:none}body:before{content:"";position:fixed;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(255,255,255,.055) 0 1px,transparent 1px 5px),radial-gradient(circle at 20% 5%,rgba(32,246,255,.15),transparent 28%),radial-gradient(circle at 80% 20%,rgba(255,47,141,.12),transparent 30%);opacity:.32;mix-blend-mode:screen}body:after{content:"";position:fixed;inset:0;pointer-events:none;background:radial-gradient(circle at center,transparent 35%,rgba(0,0,0,.78) 100%);opacity:.95}.app{position:relative;z-index:2;max-width:720px;margin:0 auto;min-height:100svh;padding:calc(14px + env(safe-area-inset-top)) 14px calc(16px + env(safe-area-inset-bottom));display:grid;grid-template-rows:auto auto 1fr auto auto;gap:12px}.frame{background:linear-gradient(180deg,rgba(16,20,26,.96),rgba(5,6,8,.96));border:1px solid rgba(32,246,255,.24);box-shadow:0 14px 34px rgba(0,0,0,.55),inset 0 0 0 1px rgba(255,255,255,.04);clip-path:polygon(0 10px,10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%)}header{padding:14px;display:grid;grid-template-columns:1fr auto;gap:10px}h1{margin:0;font-size:clamp(2.5rem,15vw,5rem);line-height:.82;letter-spacing:.06em;text-shadow:-2px 0 var(--hot),2px 0 var(--cyan),0 0 24px rgba(157,255,95,.34)}.tag{margin-top:8px;color:var(--muted);font-size:.72rem;letter-spacing:.16em;text-transform:uppercase}.light{padding:8px 9px;min-width:78px;text-align:center;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--green);border:1px solid rgba(157,255,95,.24);background:rgba(0,0,0,.34)}.transport{padding:10px;display:grid;grid-template-columns:auto 1fr auto;gap:9px;align-items:center}.tempo{display:flex;align-items:center;gap:7px}.bpm{min-width:78px;text-align:center;color:var(--yellow);font-size:1.1rem;text-shadow:0 0 14px rgba(255,232,107,.38)}button,select,input::file-selector-button{font:inherit;color:var(--text);background:#111820;border:1px solid rgba(32,246,255,.28);min-height:42px;padding:9px 12px;text-transform:uppercase;letter-spacing:.08em;clip-path:polygon(0 7px,7px 0,100% 0,100% calc(100% - 7px),calc(100% - 7px) 100%,0 100%)}button:active{transform:translateY(1px) scale(.99)}.mini{min-width:42px;padding:8px}.clock{height:18px;border:1px solid rgba(255,255,255,.12);background:repeating-linear-gradient(90deg,rgba(255,255,255,.09) 0 1px,transparent 1px 6.25%);overflow:hidden}.sweep{height:100%;width:8%;background:linear-gradient(90deg,transparent,rgba(157,255,95,.78),transparent);transform:translateX(var(--x,0%))}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:clamp(10px,3vw,16px)}.pad{position:relative;min-height:clamp(106px,19svh,152px);padding:11px;display:grid;align-content:space-between;text-align:left;background:linear-gradient(135deg,rgba(255,255,255,.075),transparent 28%),linear-gradient(180deg,#151b21,#090c10);border:2px solid rgba(32,246,255,.22);box-shadow:inset 0 0 22px rgba(0,0,0,.72),0 10px 28px rgba(0,0,0,.35);clip-path:polygon(0 13px,13px 0,100% 0,100% calc(100% - 13px),calc(100% - 13px) 100%,0 100%);touch-action:none;overflow:hidden}.pad.hit{border-color:var(--green);box-shadow:inset 0 0 20px rgba(157,255,95,.22),0 0 28px rgba(157,255,95,.12);transform:translateY(1px) scale(.992)}.pad.armed{border-color:var(--yellow)}.pad.rec{border-color:var(--red);animation:pulse .42s infinite alternate}.pad.loop{border-color:var(--cyan);box-shadow:inset 0 0 24px rgba(32,246,255,.2),0 0 28px rgba(32,246,255,.14)}.pad.mute{opacity:.5}@keyframes pulse{from{box-shadow:inset 0 0 14px rgba(255,58,58,.16)}to{box-shadow:inset 0 0 34px rgba(255,58,58,.38),0 0 34px rgba(255,58,58,.2)}}.num{color:var(--green);font-size:.72rem;letter-spacing:.14em;text-transform:uppercase}.name{font-size:clamp(1.12rem,6vw,1.82rem);font-weight:900;line-height:1;text-transform:uppercase;text-shadow:0 0 12px rgba(32,246,255,.24)}.state{color:var(--muted);font-size:.68rem;letter-spacing:.1em;text-transform:uppercase}.utility{padding:10px;display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center}select,input[type=file]{width:100%;min-height:42px;color:var(--text);background:#0d1116;border:1px solid rgba(157,255,95,.22);padding:8px}.admin{display:none;padding:12px;gap:10px;grid-template-columns:1fr 1fr}.admin.open{display:grid}.admin label{display:grid;gap:5px;color:var(--muted);font-size:.68rem;letter-spacing:.12em;text-transform:uppercase}.log{grid-column:1/-1;min-height:44px;color:var(--green);font-size:.75rem;line-height:1.35;padding:9px;border:1px solid rgba(255,255,255,.1);background:rgba(0,0,0,.3)}footer{text-align:center;color:var(--muted);font-size:.7rem;letter-spacing:.12em;text-transform:uppercase}footer a{color:var(--green);text-decoration:none;text-shadow:0 0 12px rgba(157,255,95,.4)}@media(min-width:720px){.grid{grid-template-columns:repeat(4,1fr)}.pad{min-height:150px}}</style></head><body><main class="app"><header class="frame"><div><h1>MBK</h1><div class="tag">mobile loop sampler // quantized idea catcher</div></div><div><div class="light" id="audioStatus">audio locked</div><div class="light" id="quantStatus" style="margin-top:6px">1/16 grid</div></div></header><section class="transport frame"><div class="tempo"><button class="mini" id="down">−</button><div class="bpm"><span id="bpm">120</span><small> BPM</small></div><button class="mini" id="up">+</button></div><div class="clock"><div class="sweep" id="sweep"></div></div><button id="tap">tap</button></section><section class="grid" id="pads"></section><section class="utility frame"><select id="pack"><option value="drums">Drums</option><option value="dream">Dream</option><option value="dnb">DnB</option><option value="fx">FX</option></select><input id="upload" type="file" accept="audio/*"><button id="sys">sys</button></section><section class="admin frame" id="panel"><label>Target Pad<select id="target"></select></label><label>Quantize<select id="quant"><option value="16">1/16</option><option value="8">1/8</option><option value="4">1/4</option></select></label><button id="clear">clear loops</button><button id="panic">panic stop</button><div class="log" id="log">Tap pads for instant sound. Hold a pad to lock a quantized prototype loop. Tap an active loop to mute/unmute.</div></section><footer>MATTBEAR // <a href="https://bearicide.github.io" rel="noopener">bearicide.github.io</a></footer></main><script>(()=>{const names={drums:['Kick','Snare','Hat','Clap','Perc','Rim','Sub','Crash'],dream:['Cloud','Bell','Tape','Swell','Vox','Dust','Pad','Glass'],dnb:['Break','Reese','Ghost','Rave','Metal','Chop','Pulse','Rewind'],fx:['Zap','Door','Spark','Thunk','Arcade','Wire','Static','Alarm']};let ctx,master,bpm=120,pack='drums',quant=16,selected=0,taps=[];const loops=Array.from({length:8},()=>({on:false,mute:false,timer:0,start:0}));const $=id=>document.getElementById(id),log=m=>$('log').textContent=m;function spb(){return 60/bpm}function bar(){return spb()*4}function step(){return spb()*4/quant}function nextGrid(){const n=ctx.currentTime,s=step();return Math.ceil((n+.018)/s)*s}async function unlock(){if(!ctx){ctx=new(window.AudioContext||window.webkitAudioContext)({latencyHint:'interactive'});master=ctx.createGain();master.gain.value=.82;master.connect(ctx.destination)}if(ctx.state!=='running')await ctx.resume();$('audioStatus').textContent='audio live'}function gain(t,d=.32,v=.75){const g=ctx.createGain();g.connect(master);g.gain.setValueAtTime(.0001,t);g.gain.exponentialRampToValueAtTime(v,t+.006);g.gain.exponentialRampToValueAtTime(.0001,t+d);return g}function osc(type,f,t,d,dest){const o=ctx.createOscillator();o.type=type;o.frequency.setValueAtTime(f,t);o.connect(dest);o.start(t);o.stop(t+d);return o}function noise(t,d,dest,tone=5000){const b=ctx.createBuffer(1,Math.max(1,ctx.sampleRate*d),ctx.sampleRate),a=b.getChannelData(0);for(let i=0;i<a.length;i++)a[i]=(Math.random()*2-1)*(1-i/a.length);const s=ctx.createBufferSource(),f=ctx.createBiquadFilter();f.type='lowpass';f.frequency.value=tone;s.buffer=b;s.connect(f);f.connect(dest);s.start(t);s.stop(t+d)}function hit(i,t=ctx.currentTime){const g=gain(t,pack==='dream'?1.1:.34,pack==='dream'?.35:.78);if(pack==='drums'){if(i===0){const o=osc('sine',130,t,.32,g);o.frequency.exponentialRampToValueAtTime(42,t+.22)}else if(i===1){noise(t,.2,g,2800);osc('triangle',190,t,.14,g)}else if(i===2)noise(t,.07,g,9000);else if(i===3){noise(t,.13,g,4300);osc('square',740,t,.06,g)}else if(i===4){osc('square',520,t,.12,g);noise(t,.08,g,5200)}else if(i===5)osc('triangle',880,t,.09,g);else if(i===6)osc('sine',48,t,.42,g);else noise(t,.48,g,11000)}else if(pack==='dream'){const n=[220,277,330,392,440,554,659,880][i];osc(i%2?'triangle':'sine',n,t,1.12,g);osc('sine',n/2,t,1.12,g);if(i===2||i===5)noise(t,.8,g,1800)}else if(pack==='dnb'){if(i===0){hitDrum(0,t,g);noise(t+.075,.06,g,8500)}else if(i===1){osc('sawtooth',55,t,.48,g);osc('sawtooth',56.2,t,.48,g)}else if(i===2)noise(t,.08,g,10000);else if(i===3){osc('square',990,t,.18,g);osc('sawtooth',1480,t,.18,g)}else if(i===4)noise(t,.18,g,3300);else if(i===5){for(let n=0;n<4;n++)noise(t+n*.035,.025,g,7000)}else if(i===6)osc('sawtooth',96,t,.28,g);else{const o=osc('sawtooth',1200,t,.38,g);o.frequency.exponentialRampToValueAtTime(80,t+.35)}}else{if(i%2===0){const o=osc('square',[520,110,1640,72,880,310,70,1280][i],t,.28,g);o.frequency.exponentialRampToValueAtTime([520,110,1640,72,880,310,70,1280][i]*1.8,t+.22)}else noise(t,.22+i*.02,g,900+i*900)}}function hitDrum(i,t,g){if(i===0){const o=osc('sine',130,t,.32,g);o.frequency.exponentialRampToValueAtTime(42,t+.22)}}function schedule(i,start){clearTimeout(loops[i].timer);function tick(){if(!loops[i].on)return;let nx=start;while(nx<ctx.currentTime+.04)nx+=bar();if(!loops[i].mute)hit(i,nx);loops[i].timer=setTimeout(tick,Math.max(20,(nx-ctx.currentTime)*1000-20))}tick()}function stop(i){clearTimeout(loops[i].timer);loops[i]={on:false,mute:false,timer:0,start:0}}function render(){document.querySelectorAll('.pad').forEach((p,i)=>{p.classList.toggle('loop',loops[i].on&&!loops[i].mute);p.classList.toggle('mute',loops[i].on&&loops[i].mute);p.querySelector('.state').textContent=loops[i].on?(loops[i].mute?'loop muted // tap on':'looping // tap mute'):'tap one-shot // hold loop'})}function makePads(){const pads=$('pads'),target=$('target');pads.innerHTML='';target.innerHTML='';for(let i=0;i<8;i++){let b=document.createElement('button');b.className='pad';b.type='button';b.dataset.i=i;b.innerHTML='<div class="num">pad '+(i+1)+'</div><div class="name">'+names[pack][i]+'</div><div class="state">tap one-shot // hold loop</div>';b.addEventListener('pointerdown',down,{passive:false});b.addEventListener('pointerup',up,{passive:false});b.addEventListener('pointercancel',up,{passive:false});pads.appendChild(b);let o=document.createElement('option');o.value=i;o.textContent='Pad '+(i+1);target.appendChild(o)}}async function down(e){e.preventDefault();const p=e.currentTarget,i=+p.dataset.i;selected=i;$('target').value=i;await unlock();p.setPointerCapture?.(e.pointerId);p.classList.add('hit');setTimeout(()=>p.classList.remove('hit'),120);if(loops[i].on){loops[i].mute=!loops[i].mute;render();log('Pad '+(i+1)+' loop '+(loops[i].mute?'muted':'unmuted')+'. Hold to replace.')}else hit(i);p.hold=setTimeout(()=>{p.armedAt=nextGrid();p.classList.add('armed');log('Pad '+(i+1)+' armed. Release to lock loop on grid.')},260)}function up(e){e.preventDefault();const p=e.currentTarget,i=+p.dataset.i;clearTimeout(p.hold);if(p.armedAt){const start=p.armedAt,lock=nextGrid();p.classList.remove('armed');p.classList.add('rec');setTimeout(()=>{p.classList.remove('rec');loops[i].on=true;loops[i].mute=false;loops[i].start=start;schedule(i,start);render();log('Pad '+(i+1)+' loop locked at '+bpm+' BPM. Prototype uses generated sound; true mic-buffer loop capture is next.')},Math.max(40,(lock-ctx.currentTime)*1000));p.armedAt=0}}function setB(v){bpm=Math.max(60,Math.min(180,v));$('bpm').textContent=bpm;log('BPM '+bpm+'. New loops use updated clock.')}function bind(){$('down').onclick=()=>setB(bpm-1);$('up').onclick=()=>setB(bpm+1);$('pack').onchange=e=>{pack=e.target.value;document.querySelectorAll('.name').forEach((n,i)=>n.textContent=names[pack][i]);log('Loaded '+pack.toUpperCase()+' generated starter pack.')};$('quant').onchange=e=>{quant=+e.target.value;$('quantStatus').textContent='1/'+quant+' grid';log('Quantize set to 1/'+quant)};$('target').onchange=e=>selected=+e.target.value;$('sys').onclick=()=>$('panel').classList.toggle('open');$('clear').onclick=()=>{loops.forEach((_,i)=>stop(i));render();log('All loops cleared.')};$('panic').onclick=()=>{loops.forEach((_,i)=>stop(i));render();log('Panic stop.')};$('tap').onclick=()=>{let n=performance.now();taps.push(n);taps=taps.slice(-4);if(taps.length>1){let gaps=taps.slice(1).map((t,i)=>t-taps[i]),avg=gaps.reduce((a,b)=>a+b,0)/gaps.length;setB(Math.round(60000/avg))}};$('upload').onchange=()=>log('Upload hook is visible. Decode/assign lands after timing test passes.')}}function anim(){if(ctx){$('sweep').style.setProperty('--x',((ctx.currentTime%bar())/bar()*1250)+'%')}requestAnimationFrame(anim)}makePads();bind();anim()})();</script></body></html>
