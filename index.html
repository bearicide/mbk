<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#050608">
<title>MBK // MATTBEAR</title>
<style>
:root{--bg:#050608;--text:#f4fff8;--muted:#91aaa4;--cyan:#20f6ff;--green:#9dff5f;--hot:#ff2f8d;--yellow:#ffe86b;--red:#ff3838}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:Bahnschrift,"Arial Narrow",system-ui,sans-serif;overscroll-behavior:none;touch-action:manipulation;user-select:none}
body:before{content:"";position:fixed;inset:0;pointer-events:none;background:linear-gradient(rgba(5,6,8,.74),rgba(5,6,8,.92)),url("assets/ui/allfalldown.png") center/cover no-repeat;opacity:.75;filter:contrast(1.15) saturate(1.2)}
body:after{content:"";position:fixed;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(255,255,255,.055) 0 1px,transparent 1px 5px),radial-gradient(circle at center,transparent 38%,rgba(0,0,0,.88));opacity:.75;mix-blend-mode:screen}.app{position:relative;z-index:2;max-width:780px;margin:0 auto;min-height:100svh;padding:calc(14px + env(safe-area-inset-top)) 14px calc(16px + env(safe-area-inset-bottom));display:grid;grid-template-rows:auto auto 1fr auto auto;gap:12px}.frame{background:linear-gradient(180deg,rgba(16,20,26,.95),rgba(5,6,8,.97));border:1px solid rgba(32,246,255,.24);box-shadow:0 14px 34px rgba(0,0,0,.55),inset 0 0 0 1px rgba(255,255,255,.04);clip-path:polygon(0 10px,10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%)}
header{padding:14px;display:grid;grid-template-columns:1fr auto;gap:10px}h1{margin:0;font-size:clamp(2.5rem,15vw,5rem);line-height:.82;letter-spacing:.07em;text-shadow:-2px 0 var(--hot),2px 0 var(--cyan),0 0 24px rgba(157,255,95,.34)}.tag{margin-top:8px;color:var(--muted);font-size:.72rem;letter-spacing:.16em;text-transform:uppercase}.light{padding:8px 9px;min-width:86px;text-align:center;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--green);border:1px solid rgba(157,255,95,.24);background:rgba(0,0,0,.34)}
.transport{padding:10px;display:grid;grid-template-columns:auto 1fr auto;gap:9px;align-items:center}.tempo{display:flex;align-items:center;gap:7px}.bpm{min-width:78px;text-align:center;color:var(--yellow);font-size:1.1rem;text-shadow:0 0 14px rgba(255,232,107,.38)}button,select,input::file-selector-button{font:inherit;color:var(--text);background:#111820;border:1px solid rgba(32,246,255,.28);min-height:42px;padding:9px 12px;text-transform:uppercase;letter-spacing:.08em;clip-path:polygon(0 7px,7px 0,100% 0,100% calc(100% - 7px),calc(100% - 7px) 100%,0 100%)}button:active{transform:translateY(1px) scale(.99)}.mini{min-width:42px;padding:8px}.clock{height:18px;border:1px solid rgba(255,255,255,.12);background:repeating-linear-gradient(90deg,rgba(255,255,255,.09) 0 1px,transparent 1px 6.25%);overflow:hidden}.sweep{height:100%;width:8%;background:linear-gradient(90deg,transparent,rgba(157,255,95,.8),transparent);transform:translateX(var(--x,0%))}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:clamp(10px,3vw,16px)}
.pad{position:relative;min-height:clamp(126px,20svh,172px);padding:10px;display:grid;align-content:space-between;text-align:left;background:#090c10;border:2px solid rgba(32,246,255,.22);box-shadow:inset 0 0 22px rgba(0,0,0,.72),0 10px 28px rgba(0,0,0,.35);clip-path:polygon(0 13px,13px 0,100% 0,100% calc(100% - 13px),calc(100% - 13px) 100%,0 100%);touch-action:none;overflow:hidden}.art{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.72;filter:saturate(1.25) contrast(1.08);transform:scale(1.02);pointer-events:none}.pad:before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.12),rgba(0,0,0,.82));z-index:1}.pad>*:not(.art){position:relative;z-index:2}.pad.hit{border-color:var(--green);box-shadow:inset 0 0 20px rgba(157,255,95,.22),0 0 28px rgba(157,255,95,.18);transform:translateY(1px) scale(.992)}.pad.armed{border-color:var(--yellow)}.pad.rec{border-color:var(--red);animation:pulse .42s infinite alternate}.pad.loop{border-color:var(--cyan);box-shadow:inset 0 0 24px rgba(32,246,255,.2),0 0 28px rgba(32,246,255,.22)}.pad.mute{opacity:.55}@keyframes pulse{from{box-shadow:inset 0 0 14px rgba(255,58,58,.16)}to{box-shadow:inset 0 0 34px rgba(255,58,58,.38),0 0 34px rgba(255,58,58,.2)}}.num{color:var(--green);font-size:.72rem;letter-spacing:.14em;text-transform:uppercase}.name{font-size:clamp(1.05rem,5.4vw,1.72rem);font-weight:900;line-height:1;text-transform:uppercase;text-shadow:0 2px 12px rgba(0,0,0,.9),0 0 16px rgba(32,246,255,.28)}.state{color:#d8fff2;font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;text-shadow:0 2px 10px #000}.utility{padding:10px;display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center}select,input[type=file]{width:100%;min-height:42px;color:var(--text);background:#0d1116;border:1px solid rgba(157,255,95,.22);padding:8px}.admin{display:none;padding:12px;gap:10px;grid-template-columns:1fr 1fr}.admin.open{display:grid}.admin label{display:grid;gap:5px;color:var(--muted);font-size:.68rem;letter-spacing:.12em;text-transform:uppercase}.log{grid-column:1/-1;min-height:44px;color:var(--green);font-size:.75rem;line-height:1.35;padding:9px;border:1px solid rgba(255,255,255,.1);background:rgba(0,0,0,.3)}footer{text-align:center;color:var(--muted);font-size:.7rem;letter-spacing:.12em;text-transform:uppercase}footer a{color:var(--green);text-decoration:none;text-shadow:0 0 12px rgba(157,255,95,.4)}@media(min-width:720px){.grid{grid-template-columns:repeat(4,1fr)}.pad{min-height:156px}}
</style>
</head><body><main class="app"><header class="frame"><div><h1>MBK</h1><div class="tag">8-pad mobile loop sampler // quantized idea catcher</div></div><div><div class="light" id="audioStatus">audio locked</div><div class="light" id="assetStatus" style="margin-top:6px">samples wait</div></div></header><section class="transport frame"><div class="tempo"><button class="mini" id="down">−</button><div class="bpm"><span id="bpm">120</span><small> BPM</small></div><button class="mini" id="up">+</button></div><div class="clock"><div class="sweep" id="sweep"></div></div><button id="tap">tap</button></section><section class="grid" id="pads"></section><section class="utility frame"><select id="pack"><option value="samples">Samples</option><option value="synth">Synth fallback</option></select><input id="upload" type="file" accept="audio/*"><button id="sys">sys</button></section><section class="admin frame" id="panel"><label>Target Pad<select id="target"></select></label><label>Quantize<select id="quant"><option value="16">1/16</option><option value="8">1/8</option><option value="4">1/4</option></select></label><button id="clear">clear loops</button><button id="panic">panic stop</button><div class="log" id="log">Drop pad_1.mp3 through pad_8.mp3 into assets/audio/. Missing files fall back to generated sounds.</div></section><footer>MATTBEAR // <a href="https://bearicide.github.io" rel="noopener">bearicide.github.io</a></footer></main>
<script>
(()=>{const AS="assets/",tiles=[["All Fall Down","allfalldown.png"],["Cassette","cassette.png"],["Headphones","headphones.png"],["Wild","wild.png"],["MATTBEAR","mattbear-red.png"],["Algorithm","algorithmnation.png"],["Love","love.png"],["Alarm","allfalldown.png"]];let ctx,master,bpm=120,quant=16,pack="samples",taps=[];const buffers=Array(8).fill(null),loops=Array.from({length:8},()=>({on:false,mute:false,timer:0,start:0}));const $=id=>document.getElementById(id),log=m=>$("log").textContent=m;function spb(){return 60/bpm}function bar(){return spb()*4}function step(){return spb()*4/quant}function nextGrid(){const n=ctx.currentTime,s=step();return Math.ceil((n+.018)/s)*s}async function unlock(){if(!ctx){ctx=new(window.AudioContext||window.webkitAudioContext)({latencyHint:"interactive"});master=ctx.createGain();master.gain.value=.84;master.connect(ctx.destination);loadPads()}if(ctx.state!=="running")await ctx.resume();$("audioStatus").textContent="audio live"}async function loadPads(){let ok=0;await Promise.all(buffers.map(async(_,i)=>{try{const r=await fetch(`${AS}audio/pad_${i+1}.mp3`,{cache:"no-store"});if(!r.ok)throw 0;buffers[i]=await ctx.decodeAudioData(await r.arrayBuffer());ok++}catch(e){buffers[i]=null}}));$("assetStatus").textContent=ok+"/8 loaded";log(ok?`Loaded ${ok}/8 pad audio files.`:"No pad audio found yet. Synth fallback is active.")}function g(t,d=.3,v=.78){const x=ctx.createGain();x.connect(master);x.gain.setValueAtTime(.0001,t);x.gain.exponentialRampToValueAtTime(v,t+.006);x.gain.exponentialRampToValueAtTime(.0001,t+d);return x}function osc(type,f,t,d,dest){const o=ctx.createOscillator();o.type=type;o.frequency.setValueAtTime(f,t);o.connect(dest);o.start(t);o.stop(t+d);return o}function noise(t,d,dest,tone=5000){const b=ctx.createBuffer(1,Math.max(1,ctx.sampleRate*d),ctx.sampleRate),a=b.getChannelData(0);for(let i=0;i<a.length;i++)a[i]=(Math.random()*2-1)*(1-i/a.length);const s=ctx.createBufferSource(),f=ctx.createBiquadFilter();f.type="lowpass";f.frequency.value=tone;s.buffer=b;s.connect(f);f.connect(dest);s.start(t);s.stop(t+d)}function sample(i,t){const b=buffers[i];if(!b)return false;const s=ctx.createBufferSource(),x=g(t,Math.min(b.duration,2.5),.78);s.buffer=b;s.connect(x);s.start(t);return true}function synth(i,t=ctx.currentTime){const x=g(t,.35,.75);if(i===0){const o=osc("sine",130,t,.32,x);o.frequency.exponentialRampToValueAtTime(42,t+.22)}else if(i===1){noise(t,.2,x,2800);osc("triangle",190,t,.14,x)}else if(i===2)noise(t,.07,x,9000);else if(i===3){noise(t,.13,x,4300);osc("square",740,t,.06,x)}else if(i===4){osc("square",520,t,.12,x);noise(t,.08,x,5200)}else if(i===5)osc("triangle",880,t,.09,x);else if(i===6)osc("sine",48,t,.42,x);else noise(t,.48,x,11000)}function hit(i,t=ctx.currentTime){if(pack==="samples"&&sample(i,t))return;synth(i,t)}function schedule(i,start){clearTimeout(loops[i].timer);function tick(){if(!loops[i].on)return;let nx=start;while(nx<ctx.currentTime+.04)nx+=bar();if(!loops[i].mute)hit(i,nx);loops[i].timer=setTimeout(tick,Math.max(20,(nx-ctx.currentTime)*1000-20))}tick()}function stop(i){clearTimeout(loops[i].timer);loops[i]={on:false,mute:false,timer:0,start:0}}function render(){document.querySelectorAll(".pad").forEach((p,i)=>{p.classList.toggle("loop",loops[i].on&&!loops[i].mute);p.classList.toggle("mute",loops[i].on&&loops[i].mute);p.querySelector(".state").textContent=loops[i].on?(loops[i].mute?"loop muted // tap on":"looping // tap mute"):buffers[i]?"sample ready // hold loop":"fallback // hold loop"})}function makePads(){const pads=$("pads"),target=$("target");pads.innerHTML="";target.innerHTML="";for(let i=0;i<8;i++){const b=document.createElement("button");b.className="pad";b.type="button";b.dataset.i=i;b.innerHTML=`<img class="art" src="${AS}ui/${tiles[i][1]}" alt="" onerror="this.style.display='none'"><div class="num">pad ${i+1}</div><div class="name">${tiles[i][0]}</div><div class="state">sample wait // hold loop</div>`;b.addEventListener("pointerdown",down,{passive:false});b.addEventListener("pointerup",up,{passive:false});b.addEventListener("pointercancel",up,{passive:false});pads.appendChild(b);const o=document.createElement("option");o.value=i;o.textContent="Pad "+(i+1);target.appendChild(o)}}async function down(e){e.preventDefault();const p=e.currentTarget,i=+p.dataset.i;await unlock();p.setPointerCapture?.(e.pointerId);p.classList.add("hit");setTimeout(()=>p.classList.remove("hit"),120);if(loops[i].on){loops[i].mute=!loops[i].mute;render();log("Pad "+(i+1)+" loop "+(loops[i].mute?"muted":"unmuted")+". Hold to replace.")}else hit(i);p.hold=setTimeout(()=>{p.armedAt=nextGrid();p.classList.add("armed");log("Pad "+(i+1)+" armed. Release to lock loop on grid.")},260)}function up(e){e.preventDefault();const p=e.currentTarget,i=+p.dataset.i;clearTimeout(p.hold);if(p.armedAt){const start=p.armedAt,lock=nextGrid();p.classList.remove("armed");p.classList.add("rec");setTimeout(()=>{p.classList.remove("rec");loops[i].on=true;loops[i].mute=false;loops[i].start=start;schedule(i,start);render();log("Pad "+(i+1)+" loop locked at "+bpm+" BPM.")},Math.max(40,(lock-ctx.currentTime)*1000));p.armedAt=0}}function setB(v){bpm=Math.max(60,Math.min(180,v));$("bpm").textContent=bpm;log("BPM "+bpm)}function bind(){$("down").onclick=()=>setB(bpm-1);$("up").onclick=()=>setB(bpm+1);$("pack").onchange=e=>{pack=e.target.value;log(pack==="samples"?"Samples mode. Missing files use fallback.":"Synth fallback mode.")};$("quant").onchange=e=>{quant=+e.target.value;log("Quantize set to 1/"+quant)};$("sys").onclick=()=>$("panel").classList.toggle("open");$("clear").onclick=()=>{loops.forEach((_,i)=>stop(i));render();log("All loops cleared.")};$("panic").onclick=()=>{loops.forEach((_,i)=>stop(i));render();log("Panic stop.")};$("tap").onclick=()=>{let n=performance.now();taps.push(n);taps=taps.slice(-4);if(taps.length>1){let gaps=taps.slice(1).map((t,i)=>t-taps[i]),avg=gaps.reduce((a,b)=>a+b,0)/gaps.length;setB(Math.round(60000/avg))}};$("upload").onchange=()=>log("Upload hook visible. Direct pad assignment comes after this timing test.")}function anim(){if(ctx)$("sweep").style.setProperty("--x",((ctx.currentTime%bar())/bar()*1250)+"%");requestAnimationFrame(anim)}makePads();bind();anim()})();
</script></body></html>
