<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>MBK Edit Lab</title>
<meta name="theme-color" content="#05060b">
<style>
:root{--bg:#05060b;--ink:#f5f8ff;--muted:#aab4c8;--line:rgba(255,255,255,.14);--grad:linear-gradient(90deg,#ff2f6d,#ffe047,#39ff14,#2df7ff,#8a5cff,#ff00f6)}*{box-sizing:border-box}body{margin:0;font-family:Bahnschrift,"Arial Narrow",Arial,sans-serif;background:radial-gradient(circle at top left,rgba(255,47,109,.22),transparent 34%),radial-gradient(circle at top right,rgba(45,247,255,.18),transparent 34%),linear-gradient(180deg,#05060b,#0d1320 55%,#05060b);color:var(--ink)}body:before{content:"";position:fixed;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(255,255,255,.03) 0 1px,transparent 1px 6px)}.wrap{width:min(1100px,calc(100% - 22px));margin:auto;position:relative;z-index:1}.hero{padding:24px 0}.panel{border:1px solid var(--line);border-radius:26px;background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));padding:22px;box-shadow:0 22px 60px rgba(0,0,0,.42)}h1{margin:0 0 12px;font-size:clamp(2.5rem,10vw,6rem);line-height:.9;text-transform:uppercase;background:var(--grad);background-size:300%;-webkit-background-clip:text;background-clip:text;color:transparent;animation:rainbow 5s linear infinite}.controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin:18px 0}.control{padding:14px;border-radius:18px;border:1px solid var(--line);background:rgba(0,0,0,.26)}label{display:block;font-size:.8rem;text-transform:uppercase;color:var(--muted);margin-bottom:8px;font-weight:900}input[type=range]{width:100%}.pads{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:18px}.pad{min-height:120px;border-radius:22px;border:1px solid var(--line);background:linear-gradient(135deg,rgba(255,47,109,.18),rgba(45,247,255,.12));display:flex;align-items:center;justify-content:center;text-align:center;padding:14px;font-size:1rem;font-weight:1000;text-transform:uppercase;letter-spacing:.05em;box-shadow:0 0 22px rgba(45,247,255,.08)}.pad.active{outline:2px solid #2df7ff;box-shadow:0 0 30px rgba(45,247,255,.28)}.row{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}.btn{display:inline-flex;align-items:center;justify-content:center;min-height:48px;padding:12px 16px;border-radius:16px;border:1px solid var(--line);background:rgba(255,255,255,.08);color:var(--ink);text-decoration:none;font-weight:950;text-transform:uppercase}.primary{background:var(--grad);background-size:300%;border:0;color:#081018;animation:rainbow 4s linear infinite}p{color:var(--muted);line-height:1.55}@keyframes rainbow{to{background-position:300% 50%}}@media(max-width:700px){.pads{grid-template-columns:1fr}}</style>
</head>
<body>
<section class="hero"><div class="wrap"><div class="panel"><h1>MBK Edit Lab</h1><p>Experimental loop and sampler branch. Safe place for metronome logic, overwrite recording, default loops, quantized triggering, and future mic capture.</p><div class="controls"><div class="control"><label>BPM</label><input type="range" min="60" max="180" value="120"></div><div class="control"><label>Metronome Volume</label><input type="range" min="0" max="100" value="50"></div><div class="control"><label>Master Volume</label><input type="range" min="0" max="100" value="85"></div></div><div class="row"><button class="btn primary">Metronome On</button><a class="btn" href="../">Back to Stable</a></div><div class="pads"><div class="pad active">16th Hat Loop</div><div class="pad">Shaker Loop</div><div class="pad">Kick Pattern</div><div class="pad">Record Pad<br><small>Overwrites Default</small></div></div></div></div></section>
</body>
</html>
